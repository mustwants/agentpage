<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <radialGradient id="glow" cx="72%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="320" height="200" fill="#0d0d0d"/>
  <!-- Gold radial glow -->
  <rect width="320" height="200" fill="url(#glow)"/>
  <!-- Decorative frame border -->
  <rect x="9" y="9" width="302" height="182" fill="none" stroke="#c9a96e" stroke-width=".7" opacity=".32"/>
  <!-- Nav: gold brand + muted links -->
  <rect x="20" y="18" width="58" height="7" rx="3.5" fill="#c9a96e" opacity=".65"/>
  <rect x="224" y="20" width="28" height="4" rx="2" fill="#7a7060" opacity=".75"/>
  <rect x="259" y="20" width="28" height="4" rx="2" fill="#7a7060" opacity=".75"/>
  <line x1="20" y1="30" x2="300" y2="30" stroke="#c9a96e" stroke-width=".4" opacity=".2"/>
  <!-- Header content: photo box (framed, left) -->
  <rect x="20" y="38" width="82" height="100" fill="#1a1a1a" stroke="#c9a96e" stroke-width=".75" opacity=".5"/>
  <!-- Person silhouette in photo -->
  <circle cx="61" cy="70" r="18" fill="#2d2822"/>
  <circle cx="61" cy="63" r="7" fill="#4a4038"/>
  <ellipse cx="61" cy="88" rx="14" ry="7" fill="#3d3530"/>
  <!-- Right side info: eyebrow -->
  <rect x="116" y="44" width="48" height="4.5" rx="2.25" fill="#c9a96e" opacity=".58"/>
  <!-- Bold name (white) -->
  <rect x="116" y="54" width="148" height="13" rx="2" fill="#ffffff" opacity=".88"/>
  <!-- Secondary name line -->
  <rect x="116" y="72" width="108" height="8" rx="2" fill="#ffffff" opacity=".55"/>
  <!-- Gold divider -->
  <rect x="116" y="86" width="44" height="2" rx="1" fill="#c9a96e"/>
  <!-- Tagline -->
  <rect x="116" y="95" width="120" height="5" rx="2.5" fill="#7a7060" opacity=".85"/>
  <!-- Contact pills (outlined in gold) -->
  <rect x="116" y="108" width="72" height="16" fill="none" stroke="#c9a96e" stroke-width=".8" opacity=".55"/>
  <rect x="128" y="113" width="48" height="4.5" rx="2.25" fill="#c9a96e" opacity=".48"/>
  <rect x="196" y="108" width="66" height="16" fill="none" stroke="#c9a96e" stroke-width=".8" opacity=".55"/>
  <rect x="207" y="113" width="42" height="4.5" rx="2.25" fill="#c9a96e" opacity=".48"/>
  <!-- Section header: Featured Properties -->
  <rect x="20" y="150" width="68" height="6" rx="3" fill="#ffffff" opacity=".52"/>
  <line x1="96" y1="153" x2="300" y2="153" stroke="#c9a96e" stroke-width=".6" opacity=".4"/>
  <!-- Property cards (dark) -->
  <rect x="20" y="162" width="84" height="28" fill="#1a1a1a"/>
  <rect x="116" y="162" width="84" height="28" fill="#181818"/>
  <rect x="212" y="162" width="84" height="28" fill="#1a1a1a"/>
  <!-- Footer bar -->
  <rect y="196" width="320" height="4" fill="#1a1a1a"/>
  <rect x="20" y="197" width="60" height="2" rx="1" fill="#c9a96e" opacity=".4"/>
</svg>
