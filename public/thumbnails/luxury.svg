<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#0d0d0d"/>
  <!-- Subtle gold gradient accent -->
  <radialGradient id="glow" cx="70%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="200" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="8" y="8" width="304" height="184" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity=".4"/>
  <!-- Nav -->
  <rect x="20" y="18" width="60" height="6" rx="2" fill="#c9a96e" opacity=".8"/>
  <rect x="230" y="18" width="30" height="6" rx="2" fill="#7a7060"/>
  <rect x="266" y="18" width="30" height="6" rx="2" fill="#7a7060"/>
  <!-- Photo area -->
  <rect x="20" y="40" width="80" height="100" fill="#252525" stroke="#c9a96e" stroke-width="0.5" opacity=".7"/>
  <text x="60" y="97" text-anchor="middle" font-size="32" fill="#7a7060">👤</text>
  <!-- Agent info -->
  <rect x="120" y="50" width="30" height="5" rx="2" fill="#c9a96e" opacity=".7"/>
  <rect x="120" y="64" width="150" height="12" rx="2" fill="#ffffff" opacity=".9"/>
  <rect x="120" y="82" width="60" height="3" rx="1" fill="#c9a96e"/>
  <rect x="120" y="92" width="120" height="5" rx="2" fill="#7a7060"/>
  <!-- Pills -->
  <rect x="120" y="108" width="70" height="16" rx="1" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity=".6"/>
  <rect x="198" y="108" width="70" height="16" rx="1" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity=".6"/>
  <!-- Divider -->
  <rect x="20" y="155" width="280" height="0.5" fill="#c9a96e" opacity=".2"/>
  <!-- Property grid -->
  <rect x="20" y="160" width="85" height="28" fill="#1a1a1a"/>
  <rect x="112" y="160" width="85" height="28" fill="#1a1a1a"/>
  <rect x="204" y="160" width="90" height="28" fill="#1a1a1a"/>
</svg>
