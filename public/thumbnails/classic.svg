<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#f9f5ef"/>
  <!-- Header bar -->
  <rect width="320" height="70" fill="#8b6f47"/>
  <!-- Avatar circle -->
  <circle cx="50" cy="35" r="22" fill="rgba(255,255,255,0.3)"/>
  <text x="50" y="42" text-anchor="middle" font-size="20" fill="white">👤</text>
  <!-- Name -->
  <rect x="82" y="20" width="120" height="10" rx="3" fill="rgba(255,255,255,0.8)"/>
  <rect x="82" y="36" width="80" height="7" rx="3" fill="rgba(255,255,255,0.5)"/>
  <!-- Contact bar -->
  <rect width="320" height="16" y="70" fill="#5a3e28"/>
  <rect x="20" y="75" width="60" height="6" rx="3" fill="rgba(255,255,255,0.5)"/>
  <rect x="100" y="75" width="80" height="6" rx="3" fill="#f9c97a" opacity=".8"/>
  <!-- Content lines -->
  <rect x="20" y="104" width="200" height="8" rx="3" fill="#8b6f47" opacity=".4"/>
  <rect x="20" y="120" width="280" height="6" rx="2" fill="#ccc"/>
  <rect x="20" y="132" width="260" height="6" rx="2" fill="#ccc"/>
  <rect x="20" y="144" width="220" height="6" rx="2" fill="#ccc"/>
  <!-- Property cards -->
  <rect x="20" y="160" width="80" height="28" rx="3" fill="#ddd"/>
  <rect x="110" y="160" width="80" height="28" rx="3" fill="#ddd"/>
  <rect x="200" y="160" width="80" height="28" rx="3" fill="#ddd"/>
  <!-- Footer -->
  <rect y="194" width="320" height="6" fill="#2c2c2c" opacity=".8"/>
</svg>
