<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b6f47"/>
      <stop offset="100%" stop-color="#5a3e28"/>
    </linearGradient>
  </defs>
  <!-- Warm parchment background -->
  <rect width="320" height="200" fill="#f9f5ef"/>
  <!-- Centered hero gradient -->
  <rect width="320" height="88" fill="url(#cg)"/>
  <!-- Centered avatar circle -->
  <circle cx="160" cy="44" r="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.65)" stroke-width="2.5"/>
  <circle cx="160" cy="38" r="10" fill="rgba(255,255,255,0.5)"/>
  <ellipse cx="160" cy="61" rx="16" ry="8" fill="rgba(255,255,255,0.32)"/>
  <!-- Name bar (centered) -->
  <rect x="108" y="76" width="104" height="8" rx="4" fill="rgba(255,255,255,0.78)"/>
  <!-- Title bar (centered) -->
  <rect x="122" y="89" width="76" height="5.5" rx="2.75" fill="rgba(255,255,255,0.42)"/>
  <!-- Contact bar -->
  <rect y="104" width="320" height="18" fill="#5a3e28"/>
  <rect x="28" y="110" width="62" height="5" rx="2.5" fill="rgba(255,255,255,0.38)"/>
  <rect x="124" y="110" width="72" height="5" rx="2.5" fill="#f9c97a" opacity=".78"/>
  <rect x="228" y="110" width="62" height="5" rx="2.5" fill="rgba(255,255,255,0.38)"/>
  <!-- Section header -->
  <rect x="20" y="132" width="56" height="6" rx="3" fill="#5a3e28" opacity=".48"/>
  <line x1="20" y1="142" x2="300" y2="142" stroke="#c9a96e" stroke-width="1.5" opacity=".55"/>
  <!-- Bio text lines -->
  <rect x="20" y="148" width="280" height="4.5" rx="2.25" fill="#c9a96e" opacity=".2"/>
  <rect x="20" y="157" width="238" height="4.5" rx="2.25" fill="#c9a96e" opacity=".14"/>
  <!-- Property card grid -->
  <rect x="20" y="168" width="84" height="24" rx="4" fill="#e5d9c9"/>
  <rect x="116" y="168" width="84" height="24" rx="4" fill="#ddd0be"/>
  <rect x="212" y="168" width="84" height="24" rx="4" fill="#e5d9c9"/>
  <!-- Footer -->
  <rect y="196" width="320" height="4" fill="#2c2c2c"/>
</svg>
