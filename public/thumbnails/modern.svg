<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- Clean white background -->
  <rect width="320" height="200" fill="#ffffff"/>
  <!-- Sticky nav bar -->
  <rect width="320" height="28" fill="#fff"/>
  <rect x="16" y="9" width="52" height="9" rx="3" fill="#111" opacity=".85"/>
  <rect x="238" y="11" width="28" height="5" rx="2.5" fill="#555" opacity=".5"/>
  <rect x="273" y="11" width="28" height="5" rx="2.5" fill="#555" opacity=".5"/>
  <line x1="0" y1="28" x2="320" y2="28" stroke="#eee" stroke-width="1"/>
  <!-- Split hero: left text -->
  <rect x="0" y="28" width="158" height="96" fill="#fff"/>
  <!-- Blue label -->
  <rect x="14" y="38" width="42" height="4.5" rx="2.25" fill="#0066cc" opacity=".8"/>
  <!-- Bold name -->
  <rect x="14" y="48" width="118" height="13" rx="2" fill="#111"/>
  <!-- Subtitle -->
  <rect x="14" y="67" width="95" height="5.5" rx="2.75" fill="#555" opacity=".55"/>
  <!-- Primary button -->
  <rect x="14" y="80" width="56" height="16" rx="3" fill="#111"/>
  <!-- Outline button -->
  <rect x="77" y="80" width="56" height="16" rx="3" fill="none" stroke="#111" stroke-width="1.5"/>
  <!-- Split hero: right image (person silhouette) -->
  <rect x="158" y="28" width="162" height="96" fill="#edf3ff"/>
  <circle cx="239" cy="62" r="20" fill="#c2d6f5"/>
  <circle cx="239" cy="55" r="8" fill="#a8c4ee"/>
  <ellipse cx="239" cy="82" rx="18" ry="10" fill="#b4cff0"/>
  <!-- Divider line -->
  <line x1="0" y1="124" x2="320" y2="124" stroke="#f0f0f0" stroke-width="1"/>
  <!-- Section accent bar + heading -->
  <rect x="14" y="132" width="4" height="4" rx="2" fill="#0066cc"/>
  <rect x="22" y="131" width="44" height="7" rx="3" fill="#111" opacity=".82"/>
  <line x1="14" y1="142" x2="306" y2="142" stroke="#eee" stroke-width="1"/>
  <!-- Bio text lines -->
  <rect x="14" y="148" width="220" height="4" rx="2" fill="#ddd"/>
  <rect x="14" y="156" width="182" height="4" rx="2" fill="#ddd"/>
  <!-- Property card grid -->
  <rect x="14" y="167" width="88" height="26" rx="3" fill="#f7f7f7" stroke="#eee" stroke-width="1"/>
  <rect x="114" y="167" width="88" height="26" rx="3" fill="#f7f7f7" stroke="#eee" stroke-width="1"/>
  <rect x="214" y="167" width="88" height="26" rx="3" fill="#f7f7f7" stroke="#eee" stroke-width="1"/>
  <!-- Bottom footer line -->
  <rect y="197" width="320" height="3" fill="#f5f5f5"/>
</svg>
